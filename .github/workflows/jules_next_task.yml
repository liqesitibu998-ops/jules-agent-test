name: 2. Trigger Next Jules Task

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Optional task prompt override"
        required: false
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  next-task:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        (
          github.event.pull_request.user.login == 'google-jules[bot]' ||
          contains(github.event.pull_request.labels.*.name, 'jules') ||
          startsWith(github.event.pull_request.head.ref, 'update-') ||
          startsWith(github.event.pull_request.head.ref, 'jules-') ||
      startsWith(github.event.pull_request.head.ref, 'task-')
        )
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Google Jules via REST API
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          REPOSITORY: ${{ github.repository }}
          PROMPT_OVERRIDE: ${{ github.event.inputs.prompt }}
        run: |
          if [ -n "$PROMPT_OVERRIDE" ]; then
            PROMPT="$PROMPT_OVERRIDE"
          else
            PROMPT="$(cat jules_prompt.txt)"
          fi

          curl -f 'https://jules.googleapis.com/v1alpha/sessions' \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: $JULES_API_KEY" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              --arg source "sources/github/$REPOSITORY" \
              '{
                "prompt": $prompt,
                "sourceContext": {
                  "source": $source,
                  "githubRepoContext": {
                    "startingBranch": "main"
                  }
                },
                "automationMode": "AUTO_CREATE_PR",
                "title": "Autonomous Jules task"
              }')"
