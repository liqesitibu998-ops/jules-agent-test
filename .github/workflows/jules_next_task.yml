name: 2. Trigger Next Jules Task

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Optional task prompt override"
        required: false
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  next-task:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        (
          github.event.pull_request.user.login == 'google-jules[bot]' ||
          contains(github.event.pull_request.labels.*.name, 'jules')
        )
      )

    steps:
      - name: Trigger Google Jules via REST API
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          REPOSITORY: ${{ github.repository }}
          PROMPT_OVERRIDE: ${{ github.event.inputs.prompt }}
        run: |
          if [ -n "$PROMPT_OVERRIDE" ]; then
            PROMPT="$PROMPT_OVERRIDE"
          else
            PROMPT=$(cat <<'EOF'
You are an autonomous coding agent working on this GitHub repository.

Goal:
1. Read AGENTS.md if it exists.
2. Read agent_tasks.json if it exists.
3. If agent_tasks.json exists, find the first task with status "todo" and implement it completely.
4. If agent_tasks.json does not exist, inspect the repository and choose one low/medium-risk improvement.
5. Make code changes, add or update tests where appropriate, and keep the existing project style.
6. If agent_tasks.json exists, mark the completed task as "done" and add 1-3 new concrete "todo" tasks.
7. Do not modify secrets.
8. Do not modify deployment credentials.
9. Do not delete important project files.
10. Open one Pull Request with your changes.

Rules:
- Prefer small, reviewable changes.
- Do not ask the user what to do next if a safe next task is available.
- If tests exist, make sure they pass.
- If the task is risky or requires production access, create documentation instead of touching production code.
EOF
)
          fi

          curl -f 'https://jules.googleapis.com/v1alpha/sessions' \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: $JULES_API_KEY" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              --arg source "sources/github/$REPOSITORY" \
              '{
                "prompt": $prompt,
                "sourceContext": {
                  "source": $source,
                  "githubRepoContext": {
                    "startingBranch": "main"
                  }
                },
                "automationMode": "AUTO_CREATE_PR",
                "title": "Autonomous Jules task"
              }')"